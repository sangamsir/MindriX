# ═══════════════════════════════════════════════════════════════
#  MindriX — Daily Reminder Push Notification (GitHub Actions)
#  File location in your repo: .github/workflows/mindrix-notif-cron.yml
#
#  SETUP STEPS:
#  1. Is file ko apni GitHub repo mein daalo:
#     Path: .github/workflows/mindrix-notif-cron.yml
#
#  2. GitHub repo → Settings → Secrets and variables → Actions → New secret:
#     ONESIGNAL_APP_ID    = 4ec697e3-2325-46e0-a013-c9c6ab15bbe8
#     ONESIGNAL_REST_KEY  = (OneSignal dashboard → Settings → Keys & IDs → REST API Key)
#
#  3. Yeh cron IST (UTC+5:30) ke hisaab se set hai.
#     GitHub Actions UTC mein run karta hai.
#     IST = UTC + 5:30, isliye UTC time = IST - 5:30
#
#  HOW IT WORKS:
#  - Har ghante mein ek baar run hoga (UTC 0,1,2...23)
#  - Script check karega: is waqt kaunse users ka notif_time match karta hai
#  - Unhe OneSignal se push notification jaayegi — chahe app band ho
# ═══════════════════════════════════════════════════════════════

name: MindriX Daily Reminder Push

on:
  schedule:
    # Har ghante chalega — UTC 0 se 23 tak
    # GitHub free plan mein minute-level cron unreliable hota hai
    # Isliye hum hour-level pe chala ke sabhi matching users ko push karte hain
    - cron: '0 * * * *'   # Har ghante ke :00 min pe

  # Manual trigger bhi kar sako testing ke liye
  workflow_dispatch:
    inputs:
      test_time:
        description: 'Test time (HH:MM, IST) — optional'
        required: false
        default: ''

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send MindriX Reminders
        env:
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          ONESIGNAL_REST_KEY: ${{ secrets.ONESIGNAL_REST_KEY }}
          TEST_TIME: ${{ github.event.inputs.test_time }}
        run: |
          node << 'EOF'
          const https = require('https');

          const APP_ID   = process.env.ONESIGNAL_APP_ID;
          const REST_KEY = process.env.ONESIGNAL_REST_KEY;
          const TEST_TIME = process.env.TEST_TIME || '';

          if (!APP_ID || !REST_KEY) {
            console.error('❌ ONESIGNAL_APP_ID ya ONESIGNAL_REST_KEY secret set nahi hai!');
            process.exit(1);
          }

          // Current IST time nikalo (UTC + 5:30)
          function getISTTime() {
            const now = new Date();
            // IST = UTC + 330 minutes
            const istMs = now.getTime() + (5 * 60 + 30) * 60 * 1000;
            const ist = new Date(istMs);
            const hh = String(ist.getUTCHours()).padStart(2, '0');
            const mm = String(ist.getUTCMinutes()).padStart(2, '0');
            return `${hh}:${mm}`;
          }

          // Tags mein UTC time store hota hai (frontend mxISTtoUTC se convert karke)
          // Cron har ghante chalti hai — is ghante ke saare 60 UTC minute slots cover karo
          function getHourSlots() {
            const now = new Date();
            const hh = String(now.getUTCHours()).padStart(2, '0');
            const slots = [];
            for(let m = 0; m < 60; m++){
              slots.push(`${hh}:${String(m).padStart(2,'0')}`);
            }
            return slots;
          }

          const targetSlots = TEST_TIME ? [TEST_TIME] : getHourSlots();
          const nowUTC = (() => {
            const n = new Date();
            return `${String(n.getUTCHours()).padStart(2,'0')}:${String(n.getUTCMinutes()).padStart(2,'0')}`;
          })();
          console.log(`🕐 UTC: ${nowUTC} | IST: ${getISTTime()} | Slots this hour: ${targetSlots.length}`);

          const messages = [
            'Psychology seekhna mat bhoolna! 📚 Aaj ka lesson ready hai 🦅',
            'Ek lesson daily = 90 din mein mind master! 🧠 Chalo shuru karte hain',
            'Streak mat todna! 🔥 MindriX pe aao, aaj ka psychology lesson karo',
            'Apna mind train karo — 5 minute bhi kafi hai aaj ke liye! 🦅',
            'Psychology ki ek nayi baat seekho aaj. MindriX open karo! 🧠'
          ];

          // OneSignal API call helper
          function callOneSignal(payload) {
            return new Promise((resolve) => {
              const body = JSON.stringify(payload);
              const options = {
                hostname: 'onesignal.com',
                path: '/api/v1/notifications',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': 'Basic ' + REST_KEY,
                  'Content-Length': Buffer.byteLength(body)
                }
              };
              const req = require('https').request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const result = JSON.parse(data);
                    if (result.errors && result.errors[0] === 'All included players are not subscribed') {
                      console.log(`ℹ️ Koi matching subscribed user nahi mila`);
                    } else if (result.id) {
                      console.log(`✅ Push sent! ID=${result.id} | Recipients=${result.recipients || 0}`);
                    } else {
                      console.log(`⚠️ Response:`, data);
                    }
                  } catch(e) { console.log(`📄 Raw:`, data); }
                  resolve();
                });
              });
              req.on('error', (e) => { console.error(`❌ Error:`, e.message); resolve(); });
              req.write(body);
              req.end();
            });
          }

          // Single slot ke liye (TEST_TIME use case)
          function sendPush(timeSlot) {
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            return callOneSignal({
              app_id: APP_ID,
              filters: [
                { field: 'tag', key: 'notif_time', relation: '=', value: timeSlot },
                { operator: 'AND' },
                { field: 'tag', key: 'notif_enabled', relation: '=', value: 'true' }
              ],
              headings: { en: '🧠 MindriX🦅 — Psychology Time!' },
              contents: { en: randomMsg },
              url: 'https://sangamsir.github.io',
              android_channel_id: 'mindrix-daily',
              ios_badgeType: 'Increase', ios_badgeCount: 1,
              ttl: 3600,
              collapse_id: 'mindrix-daily-' + timeSlot.replace(':', '-')
            });
          }

          // Saare slots ek hi API call mein — OR filters se
          // Tags mein UTC time stored hai, toh is ghante ke saare 60 UTC minutes cover karo
          function sendBatchPush(slots) {
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            // Build OR filter: slot1 OR slot2 OR ... AND notif_enabled=true
            const filters = [];
            slots.forEach((slot, i) => {
              if (i > 0) filters.push({ operator: 'OR' });
              filters.push({ field: 'tag', key: 'notif_time', relation: '=', value: slot });
            });
            // AND notif_enabled=true
            filters.push({ operator: 'AND' });
            filters.push({ field: 'tag', key: 'notif_enabled', relation: '=', value: 'true' });

            const hh = slots[0].split(':')[0];
            return callOneSignal({
              app_id: APP_ID,
              filters,
              headings: { en: '🧠 MindriX🦅 — Psychology Time!' },
              contents: { en: randomMsg },
              url: 'https://sangamsir.github.io',
              android_channel_id: 'mindrix-daily',
              ios_badgeType: 'Increase', ios_badgeCount: 1,
              ttl: 3600,
              collapse_id: 'mindrix-daily-hour-' + hh
            });
          }

          (async () => {
            if (TEST_TIME) {
              console.log(`🧪 Test mode: slot = ${TEST_TIME}`);
              await sendPush(TEST_TIME);
            } else {
              console.log(`📡 Sending batch for UTC hour ${targetSlots[0].split(':')[0]}...`);
              await sendBatchPush(targetSlots);
            }
            console.log('🦅 MindriX notification job complete!');
          })();
          EOF
